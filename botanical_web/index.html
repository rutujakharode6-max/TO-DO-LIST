<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌿 Botanical To-Do</title>
  <meta name="description" content="A Pinterest-worthy botanical productivity app — soft mint, sage, cream & peach." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS — LIGHT MODE (botanical)
═══════════════════════════════════════════════════ */
:root {
  --bg-top:          #E8F5F0;
  --bg-bot:          #FFF5ED;
  --sidebar-bg:      #D4EAE0;
  --sidebar-hover:   #C2DDD4;
  --sidebar-active:  #A8CDBE;
  --card-bg:         #FFFFFF;
  --card-border:     #C8E6D4;
  --card-hover:      #F0FAF5;
  --text-primary:    #3D5A4C;
  --text-secondary:  #6B8F7E;
  --text-muted:      #9DBFAE;
  --accent-mint:     #7BCFAB;
  --accent-peach:    #F4A96A;
  --accent-sage:     #8DB8A0;
  --btn-primary:     #7BCFAB;
  --btn-primary-h:   #5BB893;
  --btn-danger:      #F4A96A;
  --btn-danger-h:    #E0925A;
  --entry-bg:        #FFFFFF;
  --entry-border:    #C8E6D4;
  --done-color:      #9DBFAE;
  --high-color:      #F4A96A;
  --med-color:       #F7C98B;
  --low-color:       #7BCFAB;
  --tag-bg:          #D4EAE0;
  --tag-fg:          #3D5A4C;
  --pri-badge-high:  #F4A96A;
  --pri-badge-med:   #F7C98B;
  --pri-badge-low:   #7BCFAB;
  --shadow:          0 4px 24px rgba(61,90,76,.10);
  --shadow-card:     0 2px 12px rgba(61,90,76,.08);
  --radius-card:     18px;
  --radius-btn:      12px;
  --radius-pill:     999px;
  --transition:      all .25s cubic-bezier(.4,0,.2,1);
}

/* DARK MODE */
[data-theme="dark"] {
  --bg-top:          #1A2B24;
  --bg-bot:          #251C14;
  --sidebar-bg:      #1F3329;
  --sidebar-hover:   #263D31;
  --sidebar-active:  #2F4D3C;
  --card-bg:         #243029;
  --card-border:     #2E4D3C;
  --card-hover:      #2A3D32;
  --text-primary:    #D4EDE0;
  --text-secondary:  #8DB8A0;
  --text-muted:      #4E7063;
  --accent-mint:     #5BB893;
  --accent-peach:    #C87D4A;
  --accent-sage:     #6B9880;
  --btn-primary:     #5BB893;
  --btn-primary-h:   #4AA07E;
  --btn-danger:      #C87D4A;
  --btn-danger-h:    #B06A38;
  --entry-bg:        #1F2E28;
  --entry-border:    #2E4D3C;
  --done-color:      #3D5A4C;
  --tag-bg:          #1F3329;
  --tag-fg:          #8DB8A0;
  --shadow:          0 4px 24px rgba(0,0,0,.35);
  --shadow-card:     0 2px 12px rgba(0,0,0,.25);
}

/* ═══════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bot) 100%);
  color: var(--text-primary);
  transition: var(--transition);
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════════════
   FLOATING LEAVES CANVAS
═══════════════════════════════════════════════════ */
#leaves-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.leaf {
  position: absolute;
  font-size: 1.6rem;
  opacity: .18;
  animation: floatLeaf linear infinite;
  user-select: none;
  pointer-events: none;
}
[data-theme="dark"] .leaf { opacity: .10; }

@keyframes floatLeaf {
  0%   { transform: translateY(110vh) rotate(0deg)   translateX(0); }
  25%  { transform: translateY(75vh)  rotate(15deg)  translateX(20px); }
  50%  { transform: translateY(45vh)  rotate(-10deg) translateX(-15px); }
  75%  { transform: translateY(15vh)  rotate(20deg)  translateX(10px); }
  100% { transform: translateY(-10vh) rotate(0deg)   translateX(0); opacity: 0; }
}

/* ═══════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════ */
#app {
  position: relative;
  z-index: 1;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════ */
#sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  padding: 28px 0 20px;
  gap: 4px;
  transition: var(--transition);
  border-right: 1px solid var(--card-border);
  overflow-y: auto;
}

.brand {
  text-align: center;
  padding: 0 20px 20px;
  border-bottom: 1px solid var(--card-border);
  margin-bottom: 12px;
}
.brand-icon { font-size: 2.6rem; }
.brand-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
}
.brand-sub {
  font-size: .75rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.sidebar-section-label {
  font-size: .65rem;
  font-weight: 600;
  letter-spacing: .08em;
  color: var(--text-muted);
  padding: 0 20px;
  text-transform: uppercase;
  margin: 10px 0 4px;
}

.cat-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  border: none;
  background: transparent;
  color: var(--text-primary);
  font-family: 'Poppins', sans-serif;
  font-size: .88rem;
  cursor: pointer;
  border-radius: 0 var(--radius-pill) var(--radius-pill) 0;
  margin-right: 12px;
  transition: var(--transition);
  text-align: left;
  width: calc(100% - 12px);
}
.cat-btn:hover { background: var(--sidebar-hover); }
.cat-btn.active { background: var(--sidebar-active); font-weight: 500; }
.cat-btn .cat-count {
  margin-left: auto;
  background: var(--card-bg);
  color: var(--text-secondary);
  font-size: .7rem;
  padding: 1px 7px;
  border-radius: var(--radius-pill);
  min-width: 22px;
  text-align: center;
}

.sidebar-date {
  margin-top: auto;
  padding: 16px 20px 0;
  border-top: 1px solid var(--card-border);
}
.sidebar-date .day-name {
  font-family: 'Playfair Display', serif;
  font-size: .95rem;
  font-weight: 600;
  color: var(--text-primary);
}
.sidebar-date .full-date {
  font-size: .75rem;
  color: var(--text-muted);
}
.sidebar-leaves {
  text-align: center;
  font-size: 1.1rem;
  padding: 10px 0 0;
  color: var(--text-muted);
}

/* ═══════════════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════════════ */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 28px 0;
  flex-shrink: 0;
}
.header-left .page-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.7rem;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.1;
}
.header-left .page-sub {
  font-size: .8rem;
  color: var(--text-secondary);
  margin-top: 2px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.stats-pill {
  display: flex;
  gap: 6px;
}
.stat-chip {
  font-size: .75rem;
  padding: 4px 12px;
  border-radius: var(--radius-pill);
  background: var(--card-bg);
  color: var(--text-secondary);
  border: 1px solid var(--card-border);
  font-weight: 500;
}
/* dark-mode toggle */
.dark-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  font-size: .85rem;
  color: var(--text-secondary);
  user-select: none;
}
.toggle-track {
  width: 42px; height: 22px;
  background: var(--card-border);
  border-radius: var(--radius-pill);
  position: relative;
  transition: var(--transition);
}
[data-theme="dark"] .toggle-track { background: var(--accent-mint); }
.toggle-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #fff;
  transition: var(--transition);
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
[data-theme="dark"] .toggle-thumb { left: 23px; }

/* ── Input bar ── */
#input-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 16px 28px;
  background: var(--card-bg);
  border: 1.5px solid var(--card-border);
  border-radius: 20px;
  padding: 8px 12px 8px 18px;
  box-shadow: var(--shadow-card);
  transition: var(--transition);
  flex-shrink: 0;
}
#input-bar:focus-within {
  border-color: var(--accent-mint);
  box-shadow: 0 0 0 3px rgba(123,207,171,.18), var(--shadow-card);
}
#search-icon { font-size: 1.1rem; color: var(--text-muted); flex-shrink: 0; }
#search-input {
  flex: 1;
  border: none;
  background: transparent;
  font-family: 'Poppins', sans-serif;
  font-size: .92rem;
  color: var(--text-primary);
  outline: none;
}
#search-input::placeholder { color: var(--text-muted); }
#add-btn {
  background: var(--btn-primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-btn);
  padding: 8px 18px;
  font-family: 'Playfair Display', serif;
  font-size: .9rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
}
#add-btn:hover { background: var(--btn-primary-h); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(91,184,147,.35); }

/* ── Filter bar ── */
#filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 28px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.filter-label { font-size: .72rem; color: var(--text-muted); font-weight: 500; }
.filter-btn {
  padding: 5px 14px;
  border-radius: var(--radius-pill);
  border: 1.5px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text-secondary);
  font-family: 'Poppins', sans-serif;
  font-size: .78rem;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
.filter-btn:hover { background: var(--sidebar-hover); border-color: var(--accent-mint); }
.filter-btn.active {
  background: var(--accent-mint);
  color: #fff;
  border-color: var(--accent-mint);
  font-weight: 500;
}

/* ── Task list ── */
#task-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#task-list::-webkit-scrollbar { width: 5px; }
#task-list::-webkit-scrollbar-track { background: transparent; }
#task-list::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 4px; }

/* ── Empty state ── */
#empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 8px;
  padding: 60px 20px;
  color: var(--text-muted);
}
#empty-state .empty-icon { font-size: 3rem; }
#empty-state p { font-size: .9rem; }

/* ═══════════════════════════════════════════════════
   TASK CARD
═══════════════════════════════════════════════════ */
.task-card {
  background: var(--card-bg);
  border: 1.5px solid var(--card-border);
  border-radius: var(--radius-card);
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  box-shadow: var(--shadow-card);
  transition: var(--transition);
  animation: cardIn .3s cubic-bezier(.4,0,.2,1);
  position: relative;
  overflow: hidden;
}
.task-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 4px 0 0 4px;
}
.task-card.pri-high::before  { background: var(--high-color); }
.task-card.pri-medium::before { background: var(--med-color); }
.task-card.pri-low::before   { background: var(--low-color); }

.task-card:hover {
  border-color: var(--accent-mint);
  box-shadow: var(--shadow);
  transform: translateY(-2px);
}
.task-card.done-card { opacity: .65; }
.task-card.done-card .task-text { text-decoration: line-through; color: var(--done-color); }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Checkbox */
.task-check {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--card-border);
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: var(--transition);
  margin-top: 1px;
  font-size: .75rem;
  color: transparent;
  background: transparent;
}
.task-check:hover { border-color: var(--accent-mint); }
.task-card.done-card .task-check {
  background: var(--accent-mint);
  border-color: var(--accent-mint);
  color: #fff;
}

/* Body */
.task-body { flex: 1; min-width: 0; }
.task-text {
  font-size: .95rem;
  font-weight: 500;
  color: var(--text-primary);
  word-break: break-word;
  line-height: 1.4;
  font-family: 'Playfair Display', serif;
}
.task-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}
.task-tag {
  font-size: .68rem;
  padding: 2px 9px;
  border-radius: var(--radius-pill);
  background: var(--tag-bg);
  color: var(--tag-fg);
  font-weight: 500;
}
.pri-badge {
  font-size: .68rem;
  font-weight: 600;
  padding: 2px 9px;
  border-radius: var(--radius-pill);
  color: var(--text-primary);
}
.pri-badge.high   { background: #FFE8E8; color: #C0392B; }
.pri-badge.medium { background: #FFF5DC; color: #935300; }
.pri-badge.low    { background: #E8F8F0; color: #1A6B3C; }
[data-theme="dark"] .pri-badge.high   { background: #3A1A1A; color: #F4A96A; }
[data-theme="dark"] .pri-badge.medium { background: #352A1A; color: #F7C98B; }
[data-theme="dark"] .pri-badge.low    { background: #1A3028; color: #7BCFAB; }

.task-due {
  font-size: .7rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 3px;
}
.task-due.overdue { color: var(--btn-danger); }
.task-note {
  font-size: .78rem;
  color: var(--text-muted);
  font-style: italic;
  margin-top: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Action buttons */
.task-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
  opacity: 0;
  transition: var(--transition);
}
.task-card:hover .task-actions { opacity: 1; }

.act-btn {
  width: 30px; height: 30px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: .85rem;
  display: grid;
  place-items: center;
  transition: var(--transition);
}
.act-btn:hover { transform: scale(1.1); }
.act-btn.edit  { background: var(--sidebar-active); color: var(--text-primary); }
.act-btn.del   { background: #FFE8E8; color: #C0392B; }
[data-theme="dark"] .act-btn.del { background: #3A1A1A; color: #F4A96A; }

/* ═══════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════ */
#modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(30,50,40,.45);
  backdrop-filter: blur(6px);
  z-index: 100;
  display: none;
  place-items: center;
}
#modal-overlay.open { display: grid; }

#modal {
  background: var(--card-bg);
  border-radius: 24px;
  width: min(96vw, 500px);
  box-shadow: 0 24px 60px rgba(0,0,0,.22);
  animation: modalIn .28s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(.93) translateY(16px); }
  to   { opacity: 1; transform: scale(1)   translateY(0); }
}

.modal-header {
  background: linear-gradient(135deg, var(--accent-mint), var(--accent-sage));
  padding: 22px 24px;
  color: #fff;
}
.modal-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 700;
}
.modal-header p { font-size: .78rem; opacity: .85; margin-top: 2px; }

.modal-body { padding: 22px 24px; display: flex; flex-direction: column; gap: 14px; }

.field-group label {
  display: block;
  font-size: .75rem;
  color: var(--text-secondary);
  font-weight: 500;
  margin-bottom: 5px;
}
.field-group input,
.field-group select,
.field-group textarea {
  width: 100%;
  background: var(--entry-bg);
  border: 1.5px solid var(--entry-border);
  border-radius: 12px;
  padding: 10px 14px;
  font-family: 'Poppins', sans-serif;
  font-size: .88rem;
  color: var(--text-primary);
  outline: none;
  transition: var(--transition);
  appearance: none;
}
.field-group input:focus,
.field-group select:focus,
.field-group textarea:focus {
  border-color: var(--accent-mint);
  box-shadow: 0 0 0 3px rgba(123,207,171,.18);
}
.field-group textarea { resize: vertical; min-height: 70px; }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 0 24px 22px;
}

.btn-cancel {
  padding: 9px 20px;
  border-radius: var(--radius-btn);
  border: 1.5px solid var(--card-border);
  background: transparent;
  color: var(--text-secondary);
  font-family: 'Poppins', sans-serif;
  font-size: .85rem;
  cursor: pointer;
  transition: var(--transition);
}
.btn-cancel:hover { background: var(--sidebar-hover); }
.btn-save {
  padding: 9px 22px;
  border-radius: var(--radius-btn);
  border: none;
  background: var(--btn-primary);
  color: #fff;
  font-family: 'Playfair Display', serif;
  font-size: .92rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.btn-save:hover { background: var(--btn-primary-h); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(91,184,147,.35); }

/* ═══════════════════════════════════════════════════
   TOAST NOTIFICATION
═══════════════════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: var(--text-primary);
  color: #fff;
  padding: 12px 20px;
  border-radius: 14px;
  font-size: .84rem;
  font-weight: 500;
  box-shadow: 0 8px 28px rgba(0,0,0,.18);
  z-index: 200;
  transform: translateY(80px);
  opacity: 0;
  transition: all .35s cubic-bezier(.4,0,.2,1);
  display: flex;
  align-items: center;
  gap: 8px;
}
#toast.show { transform: translateY(0); opacity: 1; }

/* ═══════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════ */
@media (max-width: 700px) {
  #sidebar { display: none; }
  #header, #input-bar, #filter-bar, #task-list { padding-left: 16px; padding-right: 16px; }
}

/* ═══════════════════════════════════════════════════
   SELECT OPTION BG FIX (dark mode)
═══════════════════════════════════════════════════ */
[data-theme="dark"] select option { background: #243029; color: var(--text-primary); }
</style>
</head>

<body>

<!-- ═══ FLOATING LEAVES ═══ -->
<div id="leaves-canvas" aria-hidden="true"></div>

<!-- ═══ APP ═══ -->
<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-icon">🌿</div>
      <div class="brand-name">Botanical</div>
      <div class="brand-sub">To-Do</div>
    </div>

    <div class="sidebar-section-label">Categories</div>

    <button class="cat-btn active" data-cat="All"          id="cat-All">🌱 All <span class="cat-count" id="cnt-All">0</span></button>
    <button class="cat-btn"        data-cat="Work"         id="cat-Work">🌿 Work <span class="cat-count" id="cnt-Work">0</span></button>
    <button class="cat-btn"        data-cat="Personal"     id="cat-Personal">🌸 Personal <span class="cat-count" id="cnt-Personal">0</span></button>
    <button class="cat-btn"        data-cat="Study"        id="cat-Study">📚 Study <span class="cat-count" id="cnt-Study">0</span></button>
    <button class="cat-btn"        data-cat="Health"       id="cat-Health">🍃 Health <span class="cat-count" id="cnt-Health">0</span></button>

    <div class="sidebar-date" id="sidebar-date"></div>
    <div class="sidebar-leaves">🍃 🌿 🌱 🍀 🌾</div>
  </aside>

  <!-- MAIN -->
  <main id="main">

    <!-- HEADER -->
    <header id="header">
      <div class="header-left">
        <div class="page-title">My Garden 🌱</div>
        <div class="page-sub" id="page-sub">Loading…</div>
      </div>
      <div class="header-right">
        <div class="stats-pill" id="stats-pill"></div>
        <label class="dark-toggle" title="Toggle dark mode" id="dark-toggle-label">
          <span>🌙</span>
          <div class="toggle-track" id="dark-toggle" role="switch" aria-checked="false" tabindex="0">
            <div class="toggle-thumb"></div>
          </div>
        </label>
      </div>
    </header>

    <!-- INPUT BAR -->
    <div id="input-bar">
      <span id="search-icon">🔍</span>
      <input id="search-input" type="text"
             placeholder="Search tasks or type + Enter to quick-add 🌱" autocomplete="off" />
      <button id="add-btn" onclick="openModal()">+ Add Task</button>
    </div>

    <!-- FILTER BAR -->
    <div id="filter-bar">
      <span class="filter-label">Filter:</span>
      <button class="filter-btn active" data-filter="all"      id="f-all">All</button>
      <button class="filter-btn"        data-filter="pending"  id="f-pending">🌿 Pending</button>
      <button class="filter-btn"        data-filter="done"     id="f-done">✅ Done</button>
      <button class="filter-btn"        data-filter="overdue"  id="f-overdue">⚠️ Overdue</button>
      <span class="filter-label" style="margin-left:10px">Priority:</span>
      <button class="filter-btn" data-pri="All"    id="p-All">All</button>
      <button class="filter-btn" data-pri="High"   id="p-High">🔴 High</button>
      <button class="filter-btn" data-pri="Medium" id="p-Medium">🟡 Medium</button>
      <button class="filter-btn" data-pri="Low"    id="p-Low">🟢 Low</button>
    </div>

    <!-- TASK LIST -->
    <div id="task-list">
      <div id="empty-state" style="display:none">
        <div class="empty-icon">🌱</div>
        <p>No tasks here yet.</p>
        <p style="font-size:.8rem;margin-top:4px">Click <strong>+ Add Task</strong> to get started!</p>
      </div>
    </div>

  </main>
</div>

<!-- ═══ ADD/EDIT MODAL ═══ -->
<div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div id="modal">
    <div class="modal-header">
      <h2 id="modal-title">🌱 New Task</h2>
      <p id="modal-sub">Fill in the details below</p>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label for="m-title">Task title *</label>
        <input id="m-title" type="text" placeholder="What needs to be done? 🌿" />
      </div>
      <div class="field-group">
        <label for="m-note">Note (optional)</label>
        <textarea id="m-note" placeholder="Add a note…"></textarea>
      </div>
      <div class="field-row">
        <div class="field-group">
          <label for="m-cat">Category</label>
          <select id="m-cat">
            <option>Work</option>
            <option>Personal</option>
            <option>Study</option>
            <option>Health</option>
          </select>
        </div>
        <div class="field-group">
          <label for="m-pri">Priority</label>
          <select id="m-pri">
            <option value="Low">🟢 Low</option>
            <option value="Medium">🟡 Medium</option>
            <option value="High">🔴 High</option>
          </select>
        </div>
      </div>
      <div class="field-group">
        <label for="m-due">Due date (optional)</label>
        <input id="m-due" type="date" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save"   onclick="saveTask()">Save Task 🌿</button>
    </div>
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div id="toast" role="alert" aria-live="polite"></div>

<script>
/* ═══════════════════════════════════════════════════════
   DATA LAYER
═══════════════════════════════════════════════════════ */
const STORAGE_KEY = 'botanical_todo_v2';
const CATS = ['All','Work','Personal','Study','Health'];
const PRIS = ['Low','Medium','High'];

let tasks  = [];
let editId = null;
let activeCategory = 'All';
let activeFilter   = 'all';
let activePriority = 'All';
let searchTerm     = '';

function loadTasks() {
  try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { tasks = []; }
}
function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

/* ═══════════════════════════════════════════════════════
   DARK MODE
═══════════════════════════════════════════════════════ */
const html = document.documentElement;
let darkMode = localStorage.getItem('botanical_dark') === '1';

function applyDark() {
  html.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  document.getElementById('dark-toggle').setAttribute('aria-checked', darkMode);
  localStorage.setItem('botanical_dark', darkMode ? '1' : '0');
}

document.getElementById('dark-toggle').addEventListener('click', () => {
  darkMode = !darkMode;
  applyDark();
});
document.getElementById('dark-toggle').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); darkMode = !darkMode; applyDark(); }
});

/* ═══════════════════════════════════════════════════════
   FLOATING LEAVES
═══════════════════════════════════════════════════════ */
const LEAF_EMOJIS = ['🌿','🍃','🌱','🍀','🌾','☘️','🌻','🌼'];

function spawnLeaves() {
  const canvas = document.getElementById('leaves-canvas');
  canvas.innerHTML = '';
  const count = Math.min(16, Math.floor(window.innerWidth / 70));
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'leaf';
    el.textContent = LEAF_EMOJIS[Math.floor(Math.random() * LEAF_EMOJIS.length)];
    const left     = Math.random() * 100;
    const duration = 14 + Math.random() * 20;
    const delay    = -(Math.random() * duration);
    const size     = .9 + Math.random() * 1.2;
    el.style.cssText = `
      left: ${left}%;
      bottom: -60px;
      font-size: ${size}rem;
      animation-duration: ${duration}s;
      animation-delay: ${delay}s;
    `;
    canvas.appendChild(el);
  }
}

/* ═══════════════════════════════════════════════════════
   SIDEBAR DATE
═══════════════════════════════════════════════════════ */
function updateDate() {
  const now  = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mths = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('sidebar-date').innerHTML = `
    <div class="day-name">${days[now.getDay()]}</div>
    <div class="full-date">${now.getDate()} ${mths[now.getMonth()]} ${now.getFullYear()}</div>
  `;
}

/* ═══════════════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════════════ */
function updateStats() {
  const total   = tasks.length;
  const done    = tasks.filter(t => t.done).length;
  const pending = total - done;
  const pct     = total ? Math.round(done / total * 100) : 0;
  const today   = new Date().toISOString().slice(0,10);
  const overdue = tasks.filter(t => !t.done && t.due && t.due < today).length;

  document.getElementById('stats-pill').innerHTML = `
    <span class="stat-chip">✅ ${done} done</span>
    <span class="stat-chip">🌿 ${pending} pending</span>
    ${pct > 0 ? `<span class="stat-chip">📊 ${pct}%</span>` : ''}
    ${overdue > 0 ? `<span class="stat-chip" style="color:#C87D4A">⚠ ${overdue} overdue</span>` : ''}
  `;

  const sub = total === 0
    ? 'Start planting your tasks 🌱'
    : `${pct}% complete · ${pending} remaining · ${total} total`;
  document.getElementById('page-sub').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long'}) + ' · ' + sub;

  // Sidebar counts
  CATS.forEach(cat => {
    const el = document.getElementById('cnt-' + cat);
    if (el) el.textContent = cat === 'All' ? total : tasks.filter(t => t.category === cat).length;
  });
}

/* ═══════════════════════════════════════════════════════
   RENDER TASKS
═══════════════════════════════════════════════════════ */
function getFilteredTasks() {
  const today = new Date().toISOString().slice(0,10);
  return tasks
    .filter(t => {
      if (activeCategory !== 'All' && t.category !== activeCategory) return false;
      if (activeFilter === 'pending' && t.done) return false;
      if (activeFilter === 'done'    && !t.done) return false;
      if (activeFilter === 'overdue' && (t.done || !t.due || t.due >= today)) return false;
      if (activePriority !== 'All'  && t.priority !== activePriority) return false;
      if (searchTerm && !t.title.toLowerCase().includes(searchTerm) &&
          !(t.note||'').toLowerCase().includes(searchTerm) &&
          !t.category.toLowerCase().includes(searchTerm)) return false;
      return true;
    })
    .sort((a, b) => {
      // Undone first, then by priority weight, then by due date
      if (a.done !== b.done) return a.done ? 1 : -1;
      const pw = {High:0,Medium:1,Low:2};
      const pd = (pw[a.priority]||2) - (pw[b.priority]||2);
      if (pd !== 0) return pd;
      if (a.due && b.due) return a.due.localeCompare(b.due);
      return (a.due ? -1 : 1);
    });
}

function priorityClass(p) {
  if (p === 'High')   return 'high';
  if (p === 'Medium') return 'medium';
  return 'low';
}

function formatDue(due) {
  if (!due) return '';
  const d     = new Date(due + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff  = Math.round((d - today) / 86400000);
  const label = d.toLocaleDateString('en-US',{day:'numeric',month:'short',year:'numeric'});
  if (diff < 0)  return `<span class="task-due overdue">⚠️ Overdue · ${label}</span>`;
  if (diff === 0) return `<span class="task-due overdue">📅 Today · ${label}</span>`;
  if (diff === 1) return `<span class="task-due">📅 Tomorrow · ${label}</span>`;
  return `<span class="task-due">📅 ${label}</span>`;
}

function renderTasks() {
  const list     = document.getElementById('task-list');
  const emptyEl  = document.getElementById('empty-state');
  const filtered = getFilteredTasks();

  // Remove old cards (keep empty state)
  [...list.querySelectorAll('.task-card')].forEach(el => el.remove());

  if (filtered.length === 0) {
    emptyEl.style.display = 'flex';
    updateStats();
    return;
  }
  emptyEl.style.display = 'none';

  filtered.forEach(task => {
    const pc    = priorityClass(task.priority);
    const doneC = task.done ? 'done-card' : '';
    const card  = document.createElement('div');
    card.className = `task-card pri-${pc} ${doneC}`;
    card.setAttribute('data-id', task.id);
    card.innerHTML = `
      <div class="task-check" role="checkbox" aria-checked="${task.done}"
           aria-label="Mark complete" onclick="toggleDone('${task.id}')" title="Toggle complete">
        ${task.done ? '✓' : ''}
      </div>
      <div class="task-body">
        <div class="task-text">${escHtml(task.title)}</div>
        <div class="task-meta">
          <span class="task-tag">${escHtml(task.category)}</span>
          <span class="pri-badge ${pc}">● ${task.priority}</span>
          ${formatDue(task.due)}
        </div>
        ${task.note ? `<div class="task-note">${escHtml(task.note)}</div>` : ''}
      </div>
      <div class="task-actions">
        <button class="act-btn edit" onclick="openModal('${task.id}')" title="Edit task" aria-label="Edit task">✏️</button>
        <button class="act-btn del"  onclick="deleteTask('${task.id}')" title="Delete task" aria-label="Delete task">🗑</button>
      </div>
    `;
    list.appendChild(card);
  });

  updateStats();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════
   TASK CRUD
═══════════════════════════════════════════════════════ */
function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  t.completedAt = t.done ? new Date().toISOString() : null;
  saveTasks();
  renderTasks();
  showToast(t.done ? '✅ Marked complete!' : '🌱 Re-opened task');
}

function deleteTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const card = document.querySelector(`[data-id="${id}"]`);
  if (card) {
    card.style.transition = 'all .25s ease';
    card.style.opacity    = '0';
    card.style.transform  = 'scale(.95) translateX(20px)';
    setTimeout(() => {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      renderTasks();
    }, 240);
  } else {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    renderTasks();
  }
  showToast('🗑 Task deleted');
}

/* ═══════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════ */
function openModal(id = null) {
  editId = id;
  const overlay = document.getElementById('modal-overlay');
  const titleEl = document.getElementById('modal-title');
  const subEl   = document.getElementById('modal-sub');

  if (id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    titleEl.textContent = '✏️ Edit Task';
    subEl.textContent   = 'Update your task details';
    document.getElementById('m-title').value = t.title;
    document.getElementById('m-note').value  = t.note || '';
    document.getElementById('m-cat').value   = t.category;
    document.getElementById('m-pri').value   = t.priority;
    document.getElementById('m-due').value   = t.due || '';
  } else {
    titleEl.textContent = '🌱 New Task';
    subEl.textContent   = 'Fill in the details below';
    document.getElementById('m-title').value = '';
    document.getElementById('m-note').value  = '';
    document.getElementById('m-cat').value   = activeCategory !== 'All' ? activeCategory : 'Work';
    document.getElementById('m-pri').value   = 'Low';
    document.getElementById('m-due').value   = '';
  }

  overlay.classList.add('open');
  requestAnimationFrame(() => document.getElementById('m-title').focus());
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editId = null;
}

function saveTask() {
  const title = document.getElementById('m-title').value.trim();
  if (!title) {
    document.getElementById('m-title').style.borderColor = 'var(--btn-danger)';
    document.getElementById('m-title').focus();
    setTimeout(() => document.getElementById('m-title').style.borderColor = '', 1800);
    return;
  }

  const taskData = {
    title,
    note:      document.getElementById('m-note').value.trim(),
    category:  document.getElementById('m-cat').value,
    priority:  document.getElementById('m-pri').value,
    due:       document.getElementById('m-due').value || '',
  };

  if (editId) {
    const idx = tasks.findIndex(t => t.id === editId);
    if (idx > -1) Object.assign(tasks[idx], taskData);
    showToast('✏️ Task updated!');
  } else {
    tasks.push({ id: generateId(), done: false, createdAt: new Date().toISOString(), ...taskData });
    showToast('🌱 Task added!');
  }

  saveTasks();
  closeModal();
  renderTasks();
}

/* ═══════════════════════════════════════════════════════
   FILTERS
═══════════════════════════════════════════════════════ */
// Status filters
document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderTasks();
  });
});

// Priority filters
document.querySelectorAll('[data-pri]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-pri]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activePriority = btn.dataset.pri;
    renderTasks();
  });
});

// Category (sidebar)
document.querySelectorAll('[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    renderTasks();
  });
});

// Search
document.getElementById('search-input').addEventListener('input', e => {
  searchTerm = e.target.value.trim().toLowerCase();
  renderTasks();
});

// Quick-add on Enter
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const val = e.target.value.trim();
  if (!val) return;
  // If it looks like a search (matches existing tasks), don't add
  const matched = tasks.filter(t => t.title.toLowerCase().includes(val.toLowerCase()));
  if (matched.length > 0 && searchTerm) return; // pure search
  // Quick-add
  tasks.push({
    id: generateId(),
    title: val,
    note: '',
    category: activeCategory !== 'All' ? activeCategory : 'Work',
    priority: 'Low',
    due: '',
    done: false,
    createdAt: new Date().toISOString(),
  });
  saveTasks();
  e.target.value  = '';
  searchTerm      = '';
  renderTasks();
  showToast('🌱 Quick task added!');
});

/* ═══════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ═══════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  // Ctrl+N → open add modal
  if (e.ctrlKey && e.key === 'n') { e.preventDefault(); openModal(); }
  // Escape → close modal
  if (e.key === 'Escape') closeModal();
  // Enter inside modal → save
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
    if (document.activeElement.tagName !== 'TEXTAREA') { e.preventDefault(); saveTask(); }
  }
});

// Click outside modal to close
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
function init() {
  applyDark();
  loadTasks();
  updateDate();
  spawnLeaves();
  renderTasks();
}

init();

// Refresh date every minute
setInterval(updateDate, 60_000);
</script>
</body>
</html>
